{% extends "base.html" %}
{% block title %}Forgot Password — Medicare{% endblock %}

{% block content %}
<section class="auth-section">
  <div class="auth-container" style="justify-content:center;">
    <div class="auth-right" style="max-width:480px;width:100%;">
      <div class="auth-card">
        <div style="text-align:center;margin-bottom:8px;">
          <span style="font-size:52px;">🔐</span>
        </div>
        <h1 class="auth-title">Forgot Password?</h1>
        <p class="auth-subtitle" style="margin-bottom:24px;">
          Enter your username and we'll send a <strong>Reset Password</strong> link to your registered email.
        </p>

        <form action="{{ url_for('forgot_password') }}" method="POST" class="auth-form">
          <div class="form-group">
            <label for="username">Username</label>
            <div class="input-wrapper">
              <span class="input-icon">👤</span>
              <input type="text" id="username" name="username"
                     placeholder="Enter your username"
                     required autocomplete="username" />
            </div>
          </div>
          <button type="submit" class="btn btn-primary btn-full">Send Reset Link</button>
        </form>

        <p style="text-align:center;margin-top:20px;font-size:14px;color:var(--gray-500);">
          Remembered it? <a href="{{ url_for('signin') }}">Sign in</a>
        </p>
      </div>
    </div>
  </div>
</section>
{% endblock %}
