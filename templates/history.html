<!DOCTYPE html>
<html>

<head>

    <title>Health History</title>

</head>

<body>

    <h1>Health History</h1>

    <button onclick="window.location.href='/dashboard'">
        Back
    </button>

    <br><br>

    <table border="1" cellpadding="10">

        <tr>

            <th>Username</th>

            <th>Date & Time</th>

            <th>Problem</th>

            <th>Symptoms</th>

            <th>Suggestions</th>

        </tr>

        {% for row in records %}

        <tr>

            <td>{{ row[0] }}</td>

            <td>{{ row[1] }}</td>

            <td>{{ row[2] }}</td>

            <td>{{ row[3] }}</td>

            <td>{{ row[4] }}</td>

        </tr>

        {% endfor %}

    </table>

</body>

</html>
