{% extends "base.html" %}
{% block title %}Enter OTP — Medicare{% endblock %}

{% block content %}
<section class="auth-section">
  <div class="auth-container" style="justify-content:center;">
    <div class="auth-right" style="max-width:480px;width:100%;">
      <div class="auth-card">
        <div style="text-align:center;margin-bottom:8px;">
          <span style="font-size:52px;">📲</span>
        </div>
        <h1 class="auth-title">Enter Your OTP</h1>
        <p class="auth-subtitle" style="margin-bottom:8px;">
          We sent a 6-digit OTP to <strong>{{ email }}</strong>
        </p>
        <p style="text-align:center;font-size:13px;color:var(--gray-400);margin-bottom:24px;">
          Check your inbox (and spam folder). Expires in 15 minutes.
        </p>

        <form action="{{ url_for('reset_otp') }}" method="POST" class="auth-form">
          <div class="form-group">
            <label for="otp">6-Digit OTP</label>
            <div class="input-wrapper">
              <span class="input-icon">🔑</span>
              <input type="text" id="otp" name="otp" placeholder="Enter 6-digit OTP"
                     required maxlength="6" minlength="6" pattern="\d{6}"
                     autocomplete="one-time-code"
                     style="letter-spacing:6px;font-size:22px;font-weight:700;text-align:center;" />
            </div>
          </div>
          <button type="submit" class="btn btn-primary btn-full">Verify OTP</button>
        </form>

        <p style="text-align:center;margin-top:20px;font-size:14px;color:var(--gray-500);">
          Didn't receive it? <a href="{{ url_for('forgot_password') }}">Resend OTP</a>
        </p>
      </div>
    </div>
  </div>
</section>
{% endblock %}
