{% extends "base.html" %}
{% block title %}Set New Password — Medicare{% endblock %}

{% block content %}
<section class="auth-section">
  <div class="auth-container" style="justify-content:center;">
    <div class="auth-right" style="max-width:480px;width:100%;">
      <div class="auth-card">
        <div style="text-align:center;margin-bottom:8px;">
          <span style="font-size:52px;">🔒</span>
        </div>
        <h1 class="auth-title">Set New Password</h1>
        <p class="auth-subtitle" style="margin-bottom:24px;">
          Create a strong new password for your account.
        </p>

        <form action="{{ url_for('reset_password_token', token=token) }}" method="POST" class="auth-form">
          <div class="form-group">
            <label for="password">New Password</label>
            <div class="input-wrapper">
              <span class="input-icon">🔒</span>
              <input type="password" id="password" name="password"
                     placeholder="At least 6 characters" required minlength="6"
                     autocomplete="new-password" />
            </div>
          </div>
          <div class="form-group">
            <label for="confirm_password">Confirm New Password</label>
            <div class="input-wrapper">
              <span class="input-icon">🔒</span>
              <input type="password" id="confirm_password" name="confirm_password"
                     placeholder="Repeat your new password" required minlength="6"
                     autocomplete="new-password" />
            </div>
          </div>
          <button type="submit" class="btn btn-primary btn-full">Reset Password</button>
        </form>
      </div>
    </div>
  </div>
</section>
{% endblock %}

{% block extra_scripts %}
<script>
  document.querySelector("form").addEventListener("submit", function(e) {
    var p = document.getElementById("password").value;
    var c = document.getElementById("confirm_password").value;
    if (p !== c) {
      e.preventDefault();
      alert("Passwords do not match. Please try again.");
    }
  });
</script>
{% endblock %}
