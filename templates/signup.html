<!DOCTYPE html>
<html>

<head>

    <title>Signup</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="container">

    <h1>Create Medicare ID</h1>

    <form method="POST" action="/send_otp">

        <input type="text"
       name="fullname"
       placeholder="Full Name"
       required>

<input type="date"
       name="dob"
       required>

        <input type="text"
               name="username"
               placeholder="Username"
               required>

        <input type="email"
               name="email"
               placeholder="Enter Email"
               required>

        <input type="password"
               name="password"
               placeholder="Password"
               required>

        <button type="submit">
            Create Account
        </button>

    </form>

</div>

<div class="logo-box">

    <img src="{{ url_for('static', filename='images/logo2.png') }}"
         class="my-logo">

</div>

</body>
</html>
